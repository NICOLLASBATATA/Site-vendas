<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | Ateliê Gleyci Souza</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
        }

        .auth-card {
            background: var(--surface);
            padding: 50px 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-premium);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h2 {
            margin-bottom: 20px;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text);
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .error-msg,
        .success-msg {
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        .error-msg {
            color: #ff4757;
        }

        .success-msg {
            color: #2ed573;
        }

        .auth-toggle {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-toggle a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>

<body data-theme="nature">
    <div class="auth-section">
        <div class="auth-card fade-in">
            <h2 id="form-title">Login</h2>
            <form id="auth-form">
                <div class="form-group" id="name-group" style="display: none;">
                    <label>Nome</label>
                    <input type="text" id="name" placeholder="Seu nome">
                </div>
                <div class="form-group">
                    <label>E-mail ou Telefone</label>
                    <input type="text" id="email" required placeholder="Coloque Seu Email">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" required placeholder="Sua senha">
                </div>
                <div class="form-group" id="photo-group" style="display: none;">
                    <label>Foto de Perfil</label>
                    <input type="file" id="profile-photo" accept="image/*">
                    <small style="font-size: 0.8rem; color: var(--text-muted);">Obrigatório no cadastro. Sua foto será
                        usada como avatar no painel.</small>
                </div>
                <p id="error-msg" class="error-msg">Dados inválidos.</p>
                <p id="success-msg" class="success-msg">Cadastro realizado! Faça login agora.</p>

                <button type="submit" id="submit-btn" class="btn btn-primary"
                    style="width: 100%; margin-top: 10px;">Entrar</button>

                <div class="auth-toggle">
                    <span id="toggle-text">Não tem uma conta?</span> <a id="toggle-link">Cadastre-se</a>
                </div>

                <div style="margin-top: 20px;">
                    <a href="index.html"
                        style="font-size: 0.85rem; color: var(--text-muted); text-decoration: underline;">Voltar para o
                        site</a>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        let isLogin = true;
        const formTitle = document.getElementById('form-title');
        const nameGroup = document.getElementById('name-group');
        const nameInput = document.getElementById('name');
        const photoGroup = document.getElementById('photo-group');
        const photoInput = document.getElementById('profile-photo');
        const submitBtn = document.getElementById('submit-btn');
        const toggleText = document.getElementById('toggle-text');
        const toggleLink = document.getElementById('toggle-link');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        const REQUIRED_EMAIL = 'nenezinhomsouza@gmail.com';

        // Base de usuários (clientes e admin)
        let users = JSON.parse(localStorage.getItem('atelie_users')) || [];

        toggleLink.addEventListener('click', () => {
            isLogin = !isLogin;
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (isLogin) {
                formTitle.innerText = 'Login';
                nameGroup.style.display = 'none';
                nameInput.removeAttribute('required');
                photoGroup.style.display = 'none';
                photoInput.removeAttribute('required');
                submitBtn.innerText = 'Entrar';
                toggleText.innerText = 'Não tem uma conta?';
                toggleLink.innerText = 'Cadastre-se';
            } else {
                formTitle.innerText = 'Cadastro';
                nameGroup.style.display = 'block';
                nameInput.setAttribute('required', 'true');
                photoGroup.style.display = 'block';
                photoInput.setAttribute('required', 'true');
                submitBtn.innerText = 'Criar Conta';
                toggleText.innerText = 'Já possui conta?';
                toggleLink.innerText = 'Fazer Login';
            }
        });

        document.getElementById('auth-form').addEventListener('submit', function (e) {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const emailInput = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            let users = JSON.parse(localStorage.getItem('atelie_users')) || [];
            const normalizedEmail = emailInput.toLowerCase();

            if (isLogin) {
                // Procura usuário cadastrado (cliente ou admin)
                const user = users.find(u => (u.email || '').toLowerCase() === normalizedEmail && u.password === password);

                if (!user) {
                    errorMsg.innerText = 'E-mail ou senha incorretos.';
                    errorMsg.style.display = 'block';
                    return;
                }

                sessionStorage.setItem('atelie_logged_in', 'true');
                sessionStorage.setItem('atelie_current_email', normalizedEmail);
                sessionStorage.setItem('atelie_current_user', user.nome || 'Visitante');

                if (user.photo) {
                    sessionStorage.setItem('atelie_current_user_photo', user.photo);
                } else {
                    sessionStorage.removeItem('atelie_current_user_photo');
                }

                // Depois do login, sempre entra primeiro no site
                window.location.href = 'index.html';
            } else {
                // Fluxo de Cadastro – qualquer e-mail pode se cadastrar para comprar
                const existingUser = users.find(u => (u.email || '').toLowerCase() === normalizedEmail);
                if (existingUser) {
                    errorMsg.innerText = 'Este e-mail já está cadastrado.';
                    errorMsg.style.display = 'block';
                    return;
                }

                const name = document.getElementById('name').value.trim();
                const photoFile = document.getElementById('profile-photo').files[0];

                if (!photoFile) {
                    errorMsg.innerText = 'Envie uma foto de perfil para finalizar o cadastro.';
                    errorMsg.style.display = 'block';
                    return;
                }

                // Usa a mesma função de compressão do main.js
                compressImage(photoFile, function (base64Image) {
                    users.push({ nome: name, email: normalizedEmail, password: password, photo: base64Image });
                    localStorage.setItem('atelie_users', JSON.stringify(users));

                    successMsg.style.display = 'block';
                    document.getElementById('auth-form').reset();

                    // Voltar para aba de login
                    setTimeout(() => {
                        toggleLink.click();
                        successMsg.style.display = 'block'; // Manter a mensagem visível após a troca
                    }, 500);
                });
            }
        });
    </script>
</body>

</html>
