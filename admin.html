<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Produtos | Ateliê Gleyci Souza</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-section {
            padding: 150px 0 100px;
            min-height: 100vh;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 60px;
        }

        .admin-form-card {
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-premium);
            height: fit-content;
            position: sticky;
            top: 120px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        @media (max-width: 992px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }

            .admin-form-card {
                position: static;
            }
        }
    </style>
</head>

<body data-theme="nature">
    <header id="header" class="scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">Ateliê Gleyci Souza</a>
            <nav class="nav-links">
                <a href="#" onclick="logout()">Sair do Painel</a>
            </nav>
        </div>
    </header>

    <main class="admin-section">
        <div class="container">
            <div class="admin-grid">
                <div class="admin-form-card">
                    <h3 style="margin-bottom: 30px;">Novo Produto</h3>
                    <form id="product-form">
                        <div class="form-group">
                            <label>Nome do Produto</label>
                            <input type="text" id="name" required placeholder="Ex: Agenda Luxo 2024">
                        </div>
                        <div class="form-group">
                            <label>Descrição Curta / Para que serve?</label>
                            <input type="text" id="description" required
                                placeholder="Ex: Ideal para profissionais se organizarem...">
                        </div>
                        <div class="form-group">
                            <label>Preço (R$)</label>
                            <input type="text" id="price" required placeholder="Ex: 180,00">
                        </div>
                        <div class="form-group">
                            <label>Foto do Produto</label>
                            <input type="file" id="image-file" accept="image/*">
                            <small style="color: var(--text-muted); font-size: 0.8rem;">Deixe vazio ao editar se quiser
                                manter a foto atual.</small>
                        </div>
                        <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" id="is-top10" style="width: auto;">
                            <label for="is-top10" style="margin-bottom: 0;">Destaque (Top 10 Mais Pedidos)</label>
                        </div>
                        <input type="hidden" id="editing-id" value="">
                        <button type="submit" id="submit-action-btn" class="btn btn-primary" style="width: 100%;">Salvar
                            Produto</button>
                        <button type="button" id="cancel-edit-btn" class="btn btn-outline"
                            style="width: 100%; margin-top: 10px; display: none;">Cancelar Edição</button>
                    </form>
                </div>

                <div>
                    <h3 style="margin-bottom: 40px;">Produtos Ativos</h3>
                    <div id="admin-product-grid" class="product-grid"
                        style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">
                        <!-- Admin products -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>

</html>
